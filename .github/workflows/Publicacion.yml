name: Publicar paquetes NuGet de Autorización

on:
  push:
    branches: [ "main" ]
    paths:
      - 'MiddlewareAutorizacion/**'
  workflow_dispatch:

  
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restaurar dependencias
        run: |
          cd "MiddlewareAutorizacion"
          dotnet restore

      - name: Compilar en Release
        run: |
          cd "MiddlewareAutorizacion"
          dotnet build --configuration Release --no-restore

      - name: Cleanup old .nupkg files
        run: |
          rm -f MiddlewareAutorizacion/nupkgs/*.nupkg

      - name: Empaquetar (dotnet pack)
        run: |
          cd "MiddlewareAutorizacion"
          dotnet pack --configuration Release --no-build --output ./nupkgs

      - name: Set up NuGet sources
        run: dotnet nuget add source "https://nuget.pkg.github.com/D-Q-A/index.json" --name "github" --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Publicar en GitHub Packages
        run: |
          cd "MiddlewareAutorizacion"
          dotnet nuget push ./nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/D-Q-A/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
