name: Publicar paquetes Autorizacion.*

on:
  push:
    branches: [ main ]
    paths:
      - 'AutorizacionMiddleware/**'

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Registrar fuente GitHub Packages
        run: |
          dotnet nuget add source \
            --username D-Q-A \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name "GitHub-D-Q-A" \
            "https://nuget.pkg.github.com/D-Q-A/index.json"

      - name: Restaurar dependencias
        working-directory: AutorizacionMiddleware
        run: dotnet restore

      - name: Empaquetar (en orden de dependencia)
        working-directory: AutorizacionMiddleware
        run: |
          dotnet pack Abstracciones.BW/Autorizacion.BW.csproj -c Release
          dotnet pack Autorizacion.DA/Autorizacion.DA.csproj                       -c Release
          dotnet pack AutorizacionAbstracciones/Autorizacion.Abstracciones.csproj                 -c Release
          dotnet pack Autorizacion.Middleware/Autorizacion.Middleware.csproj       -c Release

      - name: Publicar paquetes
        working-directory: AutorizacionMiddleware
        run: |
          find . -name "*.nupkg" | while read pkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source "https://nuget.pkg.github.com/D-Q-A/index.json" \
              --skip-duplicate
          done
